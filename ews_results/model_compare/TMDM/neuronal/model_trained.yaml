dataset:
  F_consistency: false
  file_path: dataset/spdata_sde_neuronal
  filter: '*'
  interval_step: 100
  pred_len: 100
  sampling_t: 10
  windows: 100
loss:
  loss_metric: TMDM loss
net:
  CART_input_x_embed_dim: 64
  activation: gelu
  beta_end: 0.02
  beta_schedule: linear
  beta_start: 0.0001
  d_ff: 128
  d_layers: 1
  d_model: 64
  d_z: 64
  dataset_nf: 1
  device: cuda:1
  diffusion_config_dir: models/Diffusion_model/TMDM/tmdm.yml
  diffusion_steps: 20
  dropout: 0.05
  e_layers: 2
  embed: fixed
  factor: 3
  freq: h
  k_cond: 1.0
  k_z: 0.01
  n_heads: 4
  n_z_samples: 100
  output_attention: false
  p_hidden_dims:
  - 64
  - 64
  p_hidden_layers: 2
  parallel_sample: 10
  pred_len: 100
  pretrain_f_path: results/pre_model_F/dataset__w100p100st10
  pretrain_g_path: results/pre_model_g/dataset__w100p100st10
  scaler_type: StandardScaler
  task_model: TMDM
  windows: 100
optimizer:
  MstepLR_gamma: 0.1
  MstepLR_milestones:
  - 10
  lr: 0.001
  optimizer_name: Adam
  scheduler: MultiStepLR
  scheduler_set: false
  weight_decay: 1e-5
train:
  ckpt: false
  ckpt_period: 2
  dataparallel: false
  model_evaluation: hold_out
  pretrain_model: None
  pretrain_path: None
  test_set: true
  train_batch_size: 512
  train_epochs: 50
  train_model_select: TMDM_model
  traindata_size: 0.8
  val_batch_size: 512
